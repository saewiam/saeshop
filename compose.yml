services:
  cms:
    build:
      context: ./cms
      target: files
      args:
        NODE_ENV: development
      additional_contexts:
        payload: ./payload
    volumes:
      - static:/app/static
      - cms_build:/app/.next
      - cms_modules:/app/node_modules
    command: sh -c "npm run dev"
    develop:
      watch:
        - action: sync
          path: ./cms
          target: /app
          initial_sync: true
        - action: sync
          path: ./payload
          target: /app/node_modules/@saewiam/saeshop-payload
          initial_sync: true
        - action: rebuild
          path: ./cms/package.json
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    env_file: "./payload/development.env"
    environment:
      HOSTNAME: "0.0.0.0"
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-payload_development_secret}
  frontend:
    build:
      context: ./frontend
      target: files
      args:
        NODE_ENV: development
      additional_contexts:
        payload: ./payload
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          initial_sync: true
        - action: sync
          path: ./payload
          target: /app/node_modules/@saewiam/saeshop-payload
          initial_sync: true
        - action: rebuild
          path: ./frontend/package.json
    volumes:
      - astro_modules:/app/node_modules
    command: sh -c "npm run dev -- --host --port 3000"
    env_file: "./payload/development.env"
    depends_on:
      cms:
        condition: service_started
  postgres:
    image: postgres:18-alpine
    shm_size: 128mb
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d
    env_file:
      - "./postgres/development.env"
      - "./payload/development.env"
    environment:
      - POSTGRES_USER=${DB_ROOTUSER:-postgres}
      - POSTGRES_PASSWORD=${DB_ROOTUSER:-password}
    healthcheck:
      test: sh -c "pg_isready -U ${PAYLOAD_PGUSER:?need payload user} -d ${PAYLOAD_PGDATABASE:?need payload database}"
      interval: 10s
      timeout: 3s
      retries: 2
      start_interval: 0.5s
      start_period: 15s
  caddy:
    image: caddy:latest
    ports:
      - '80:80'
    configs:
      - source: caddy
        target: /etc/caddy/Caddyfile
    volumes:
      - static:/srv/static
    develop:
      watch:
        - action: sync+restart
          path: ./Caddyfile
          target: /etc/caddy/Caddyfile
volumes:
  astro_modules:
  postgres_data:
  cms_modules:
  cms_build:
  static:
configs:
  caddy:
    file: ./Caddyfile
